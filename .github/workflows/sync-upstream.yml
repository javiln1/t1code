name: Sync T1Code Upstream

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  sync-upstream:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add and fetch upstream
        run: |
          git remote add upstream https://github.com/maria-rcks/t1code.git 2>/dev/null || git remote set-url upstream https://github.com/maria-rcks/t1code.git
          git fetch origin main
          git fetch upstream main

      - name: Prepare sync branch
        id: sync
        run: |
          git checkout -B chore/upstream-sync origin/main

          if git merge-base --is-ancestor upstream/main HEAD; then
            echo "needs_sync=false" >> "$GITHUB_OUTPUT"
            echo "merge_conflict=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git merge --no-ff --no-edit upstream/main; then
            echo "needs_sync=true" >> "$GITHUB_OUTPUT"
            echo "merge_conflict=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git merge --abort || true
          echo "needs_sync=false" >> "$GITHUB_OUTPUT"
          echo "merge_conflict=true" >> "$GITHUB_OUTPUT"

      - name: Create or update sync pull request
        if: steps.sync.outputs.needs_sync == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git push --force-with-lease origin chore/upstream-sync

          title='chore(sync): merge upstream t1code updates'
          body=$(cat <<'EOF'
          Automated sync PR from `maria-rcks/t1code`.

          Notes:
          - This branch was created from `main`.
          - Upstream `maria-rcks/t1code` was merged into it.
          - Review this PR before merging if local customizations changed overlapping files.
          EOF
          )

          pr_number=$(gh pr list --base main --head chore/upstream-sync --json number --jq '.[0].number // empty')

          if [ -n "$pr_number" ]; then
            gh pr edit "$pr_number" --title "$title" --body "$body"
          else
            gh pr create --base main --head chore/upstream-sync --title "$title" --body "$body"
          fi

      - name: Create or update conflict issue
        if: steps.sync.outputs.merge_conflict == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            const title = 'Manual upstream sync required';
            const body = [
              'The scheduled upstream sync could not be merged automatically.',
              '',
              'Action taken:',
              '- Fetched `maria-rcks/t1code`.',
              '- Attempted to merge `upstream/main` into a branch created from `main`.',
              '- Merge conflicts were detected.',
              '',
              'Recommended next step:',
              '- Pull the latest changes locally.',
              '- Merge `upstream/main` manually.',
              '- Resolve conflicts and push the result.'
            ].join('\n');
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              creator: 'github-actions[bot]',
              per_page: 100,
            });
            const existing = issues.find((issue) => issue.title === title);
            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
              });
            }
